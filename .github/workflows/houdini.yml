name: Weekly

on:
  workflow_dispatch:
  schedule:
    - cron: '5 3 * * 0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.ts.outputs.TIME }}
      date: ${{ steps.ts.outputs.DATE }}
    strategy:
      matrix:
        build-type: [sweet]
        ksu-type: [zako, zako_susfs, none]

    steps:
      - uses: actions/checkout@v6

      - name: Timestamp
        id: ts
        run: |
          DATE=$(date +'%Y%m%d')
          TIME=$(date +'%s')
          echo "DATE=$DATE" >> $GITHUB_OUTPUT
          echo "TIME=$TIME" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc build-essential bison flex zip p7zip-full \
            libc6 curl libstdc++6 git wget libssl-dev zstd \
            lld python3 patchutils

      - name: Preparing kernel sources
        run: |
          if [ -d "$PWD/android_kernel_xiaomi_sm6150" ]; then
            rm -rf android_kernel_xiaomi_sm6150
          fi
          echo "Cloning kernel sources..."
          git clone https://github.com/PPLGUNITESTAR/fefek.git -b "lineage-23.2" --depth=1 android_kernel_xiaomi_sm6150
          echo "Copying buildscript..."
          cp sweet.sh android_kernel_xiaomi_sm6150/
          chmod +x ./android_kernel_xiaomi_sm6150/sweet.sh

      - name: Compile the kernel
        run: |
          echo "Determining KSU type..."
          if [[ "${{ matrix.ksu-type }}" == "zako" ]]; then
            echo "Using KSU_ZAKO"
            export KSU_CHOICE="KSU_ZAKO"
          elif [[ "${{ matrix.ksu-type }}" == "zako_susfs" ]]; then
            echo "Using KSU_ZAKO_SUSFS"
            export KSU_CHOICE="KSU_ZAKO_SUSFS"
          elif [[ "${{ matrix.ksu-type }}" == "none" ]]; then
            echo "No KSU will be used"
            export KSU_CHOICE="NONE"
          else
            echo "Invalid KSU type: ${{ matrix.ksu-type }}"
            exit 1
          fi
          
          echo "Starting to compile..."
          cd android_kernel_xiaomi_sm6150/
          ./sweet.sh sweet --ksu=$KSU_CHOICE
          cd ..

      - name: Preparing AnyKernel3 sources
        run: |
          if [ -d "$PWD/AnyKernel3" ]; then
            rm -rf AnyKernel3
          fi
          git clone https://github.com/riarumoda/AnyKernel3 AnyKernel3 --depth=1
          
          echo "Copying compiled artifacts to AnyKernel3..."
          cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/Image.gz AnyKernel3/
          cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtb.img AnyKernel3/
          cp android_kernel_xiaomi_sm6150/out/arch/arm64/boot/dtbo.img AnyKernel3/
          
          echo "Patching AnyKernel3 configuration for sweet..."
          sed -i 's/supported.versions=11-16/supported.versions=11-16/' AnyKernel3/anykernel.sh
          sed -i 's/device.name1=sweet/device.name1=sweet/' AnyKernel3/anykernel.sh
          sed -i 's/device.name2=sweetin/device.name2=sweetin/' AnyKernel3/anykernel.sh
          sed -i 's/sweet (sm6150)/sweet (sm6150)/g' AnyKernel3/banner

      - name: Pack kernel with AnyKernel3
        run: |
          ZIPNAME="Houdini-${{ matrix.build-type }}-weekly-${{ matrix.ksu-type }}-${{ steps.ts.outputs.DATE }}-${{ steps.ts.outputs.TIME }}.zip"
          cd AnyKernel3
          zip -rq9 "../$ZIPNAME" ./*
          cd ..

      - name: Upload artifacts (All builds)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.build-type }}-${{ matrix.ksu-type }}
          path: |
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded zips
        run: ls -lah artifacts

      - name: Timestamp
        id: ts
        run: |
          FANCYDATE=$(date +'%Y/%m/%d')
          echo "FANCYDATE=$FANCYDATE" >> $GITHUB_OUTPUT

      - name: Create Release and Upload builds
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: kernel-weekly-${{ needs.build.outputs.timestamp }}
          name: Weekly - ${{ steps.ts.outputs.FANCYDATE }}
          draft: false
          prerelease: false
          body: |
            > [!NOTE]   
            > - The kernel supports Android 11 to 16.   
            > - ReSukiSU latest manager can be found in [here](https://resukisu.github.io/guide/install.html#Get-manager).    
               
            > [!IMPORTANT]
            > - "zako" build contains ReSukiSU (Recommended).   
            > - "zako_susfs" build contains ReSukiSU + SUSFS.   
            > - "none" build does not contain any KernelSU.   

            > [!CAUTION]   
            > - Always backup your boot & dtbo image first before proceeding!   
          files: |
            artifacts/**/*.zip
          overwrite_files: true

